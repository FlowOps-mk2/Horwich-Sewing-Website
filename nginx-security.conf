# Horwich Sewing SK — nginx security snippet
# Include inside your server { } block (or a location / { } block), then reload nginx.
# Netlify/Cloudflare Pages use _headers; Apache uses .htaccess.

add_header X-Frame-Options "DENY" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), camera=(), microphone=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
add_header Cross-Origin-Opener-Policy "same-origin" always;
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

# Redirect HTTP -> HTTPS (separate server block listening on :80):
#   server { listen 80; server_name horwichsewingsk.com www.horwichsewingsk.com; return 301 https://$host$request_uri; }

# Don't expose the nginx version
server_tokens off;
